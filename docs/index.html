<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>ONOFRE — Visor de pronòstic</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1216; --map-bg: #050a0d;
    --panel: #ffffff; --panel-border: #d5d5d5;
    --text: #262626; --text-dim: #5a5a5a;
    --charcoal: #2b2b2b; --charcoal-2: #3c3c3c;
    --red: #C8102E; --red-dark: #96001f;
    --font-ui: 'Roboto', sans-serif; --font-mono: 'Roboto Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
               font-family: var(--font-ui); }
  #map { position: absolute; inset: 0; background: var(--map-bg); }
  .grid-canvas-layer { pointer-events: none; }

  #topbar {
    position: absolute; top: 12px; left: 12px; right: 12px; z-index: 1000;
    display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap;
    pointer-events: none;
  }
  .panel {
    background: var(--panel); border: 1px solid var(--panel-border); border-radius: 8px;
    padding: 10px 14px; pointer-events: auto; box-shadow: 0 3px 10px rgba(0,0,0,.18);
  }
  #varSelect { display: flex; gap: 6px; }
  .var-btn {
    background: transparent; border: 1px solid var(--panel-border); color: var(--charcoal);
    padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    font-family: var(--font-ui); font-weight: 500;
  }
  .var-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

  #domainNote { font-size: 12px; color: var(--text-dim); margin-top: 6px; max-width: 260px; }

  #legend { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
  .legend-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim);
                font-family: var(--font-mono); }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(0,0,0,.15); }

  #bottombar {
    position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 1000;
    display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
    pointer-events: none;
  }
  #timePanel { flex: 1; min-width: 260px; pointer-events: auto; }
  #timeRow { display: flex; align-items: center; gap: 10px; }
  #playBtn {
    background: var(--red); border: none; color: #fff; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; font-size: 14px; flex-shrink: 0;
  }
  #playBtn:hover { background: var(--red-dark); }
  #timeSlider { flex: 1; accent-color: var(--red); }
  #timeLabel { font-size: 13px; color: var(--text-dim); min-width: 130px; text-align: right;
               font-family: var(--font-mono); }

  .dl-btn {
    background: transparent; border: 1px solid var(--panel-border); color: var(--charcoal);
    padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px;
    text-decoration: none; display: inline-block; font-family: var(--font-ui); font-weight: 500;
  }
  .dl-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
  .dl-btn:disabled { opacity: .4; cursor: not-allowed; }

  #viewportPanel { pointer-events: auto; min-width: 240px; }
  #viewportPanel h4 { margin: 0 0 8px 0; font-size: 11px; color: var(--text-dim);
                       text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
  #daysRow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  #daysRow input[type=range] { flex: 1; accent-color: var(--red); }
  #daysLabel { font-size: 12px; color: var(--text-dim); min-width: 55px; text-align: right;
               font-family: var(--font-mono); }
  #viewportBtns { display: flex; gap: 8px; }
  #statusMsg { font-size: 11px; color: var(--red); margin-top: 6px; min-height: 14px; font-family: var(--font-mono); }
  #coverageWarn { font-size: 11px; color: var(--red-dark); margin-top: 4px; display: none; }
</style>
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div class="panel">
    <div id="varSelect"></div>
    <div id="domainNote"></div>
    <div id="legend"></div>
  </div>
</div>

<div id="bottombar">
  <div class="panel" id="timePanel">
    <div id="timeRow">
      <button id="playBtn">▶</button>
      <input type="range" id="timeSlider" min="0" max="0" value="0" step="1">
      <span id="timeLabel">—</span>
    </div>
  </div>

  <div class="panel" id="viewportPanel">
    <h4>Descarrega la vista actual</h4>
    <div id="daysRow">
      <input type="range" id="daysSlider" min="1" max="1" value="1" step="1">
      <span id="daysLabel">— dies</span>
    </div>
    <div id="viewportBtns">
      <button class="dl-btn" id="btnViewMosaic">📷 Mosaic PNG</button>
      <button class="dl-btn" id="btnViewGif">🎞 GIF</button>
    </div>
    <div id="statusMsg"></div>
    <div id="coverageWarn">⚠ La vista actual no coincideix amb la cobertura d'aquesta variable.</div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./vendor/gif.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────
// CONFIGURACIÓ
// ─────────────────────────────────────────────────────────────────────────
const DATA_ROOT = "./data";
const RUN_TAG = "latest";

const VARIABLES = [
  { id: "complexitat",   label: "Complexitat (Finestra IF)" },
  { id: "piroconveccio", label: "Tipus de piroconvecció" },
  { id: "ros_fli",       label: "ROS / FLI" },
];

// Preferència purament visual (no és "dada"): quines variables amaguen
// el valor 0 en comptes de pintar-lo. Editar aquí, no cal tocar el
// backend ni regenerar res — és només com es dibuixa, no què es calcula.
const TRANSPARENT_ZERO = {
  complexitat: true,
  piroconveccio: false,
  ros_fli: true,
};

const CATALUNYA_CENTER = [41.5, 1.3];
const CATALUNYA_ZOOM = 8;

// ─────────────────────────────────────────────────────────────────────────
// MAPA BASE
// ─────────────────────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl: true }).setView(CATALUNYA_CENTER, CATALUNYA_ZOOM);
L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
  attribution: "&copy; OpenStreetMap &copy; CARTO",
  maxZoom: 14,
}).addTo(map);

// ─────────────────────────────────────────────────────────────────────────
// CAPA DE GRAELLA (dibuixa cada cel·la amb <canvas>, sempre nítida)
// ─────────────────────────────────────────────────────────────────────────
function colorForValue(v, colorBins, transparentZero) {
  if (v === null || v === undefined) return null;
  if (transparentZero && v === 0) return null;
  for (const bin of colorBins) {
    if (v < bin.max) return bin.color;
  }
  return colorBins[colorBins.length - 1].color;
}

const GridLayer = L.Layer.extend({
  onAdd(map) {
    this._map = map;
    this._canvas = L.DomUtil.create("canvas", "grid-canvas-layer");
    map.getPanes().overlayPane.appendChild(this._canvas);
    map.on("moveend zoomend resize", this._reset, this);
    this._reset();
  },
  onRemove(map) {
    L.DomUtil.remove(this._canvas);
    map.off("moveend zoomend resize", this._reset, this);
  },
  _reset() {
    const size = this._map.getSize();
    const topLeft = this._map.containerPointToLayerPoint([0, 0]);
    L.DomUtil.setPosition(this._canvas, topLeft);
    this._canvas.width = size.x;
    this._canvas.height = size.y;
    this.draw();
  },
  setData(lon, lat, colorBins, transparentZero) {
    this._lon = lon; this._lat = lat; this._colorBins = colorBins;
    this._transparentZero = !!transparentZero;
  },
  setFrame(values) {
    this._values = values;
    this.draw();
  },
  draw() {
    if (!this._map || !this._values || !this._lon) return;
    const ctx = this._canvas.getContext("2d");
    ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);

    const lon = this._lon, lat = this._lat, values = this._values;
    const resLon = lon.length > 1 ? lon[1] - lon[0] : 0.0625;
    const resLat = lat.length > 1 ? lat[1] - lat[0] : 0.0625;
    const bounds = this._map.getBounds().pad(0.15);

    // Vores de la graella (nlon+1 / nlat+1 valors), calculades UN COP i
    // compartides entre cel·les veïnes — així dues cel·les contigües
    // encaixen exactament pel mateix píxel, sense ni escletxa ni
    // solapament (que amb alpha<1 es veia com una línia de color barrejat).
    // En Web Mercator (la projecció de Leaflet), x només depèn de lon i
    // y només depèn de lat, així que això és exacte, no una aproximació.
    const refLat = lat[0], refLon = lon[0];
    const xPix = new Array(lon.length + 1);
    for (let j = 0; j <= lon.length; j++) {
      const edgeLon = j < lon.length ? lon[j] - resLon / 2 : lon[lon.length - 1] + resLon / 2;
      xPix[j] = Math.round(this._map.latLngToContainerPoint([refLat, edgeLon]).x);
    }
    const yPix = new Array(lat.length + 1);
    for (let i = 0; i <= lat.length; i++) {
      const edgeLat = i < lat.length ? lat[i] - resLat / 2 : lat[lat.length - 1] + resLat / 2;
      yPix[i] = Math.round(this._map.latLngToContainerPoint([edgeLat, refLon]).y);
    }

    ctx.globalAlpha = 0.85;
    for (let i = 0; i < lat.length; i++) {
      const cLat = lat[i];
      if (cLat < bounds.getSouth() - Math.abs(resLat) || cLat > bounds.getNorth() + Math.abs(resLat)) continue;
      const row = values[i];
      const y1 = yPix[i], y2 = yPix[i + 1];
      const y = Math.min(y1, y2), h = Math.abs(y2 - y1);
      for (let j = 0; j < lon.length; j++) {
        const v = row[j];
        if (v === null) continue;
        const cLon = lon[j];
        if (cLon < bounds.getWest() - Math.abs(resLon) || cLon > bounds.getEast() + Math.abs(resLon)) continue;

        const color = colorForValue(v, this._colorBins, this._transparentZero);
        if (!color) continue;

        const x1 = xPix[j], x2 = xPix[j + 1];
        ctx.fillStyle = color;
        ctx.fillRect(Math.min(x1, x2), y, Math.abs(x2 - x1), h);
      }
    }
  },
});

const gridLayer = new GridLayer();
gridLayer.addTo(map);

let currentVar = null;
let manifest = null;
let playing = false;
let playTimer = null;

const varSelectEl   = document.getElementById("varSelect");
const domainNoteEl  = document.getElementById("domainNote");
const legendEl      = document.getElementById("legend");
const sliderEl       = document.getElementById("timeSlider");
const labelEl        = document.getElementById("timeLabel");
const playBtn        = document.getElementById("playBtn");
const daysSlider      = document.getElementById("daysSlider");
const daysLabel       = document.getElementById("daysLabel");
const btnViewMosaic   = document.getElementById("btnViewMosaic");
const btnViewGif      = document.getElementById("btnViewGif");
const statusMsgEl     = document.getElementById("statusMsg");
const coverageWarnEl  = document.getElementById("coverageWarn");

// ─────────────────────────────────────────────────────────────────────────
// SELECTOR DE VARIABLE
// ─────────────────────────────────────────────────────────────────────────
VARIABLES.forEach(v => {
  const btn = document.createElement("button");
  btn.className = "var-btn";
  btn.textContent = v.label;
  btn.dataset.id = v.id;
  btn.onclick = () => loadVariable(v.id);
  varSelectEl.appendChild(btn);
});

function setActiveButton(id) {
  document.querySelectorAll(".var-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.id === id);
  });
}

// ─────────────────────────────────────────────────────────────────────────
// CÀRREGA DE VARIABLE (manifest.json amb lon/lat/color_bins/frames)
// ─────────────────────────────────────────────────────────────────────────
async function loadVariable(id) {
  setActiveButton(id);
  currentVar = id;
  stopPlaying();
  frameCache = {};  // neteja el cache de frames de la variable anterior

  const base = `${DATA_ROOT}/${id}/${RUN_TAG}`;
  const res = await fetch(`${base}/manifest.json`);
  manifest = await res.json();
  manifest._base = base;

  gridLayer.setData(manifest.lon, manifest.lat, manifest.color_bins, TRANSPARENT_ZERO[id]);

  sliderEl.max = manifest.frames.length - 1;
  sliderEl.value = 0;
  await renderFrame(0);

  domainNoteEl.textContent = manifest.domain_note || "";
  renderLegend(manifest.color_bins, manifest.legend_labels);
  updateDaysControl();
  updateCoverageWarning();

  // Nomès centra a Catalunya per a variables que hi són limitades (ROS/FLI).
  // Les variables europees deixen l'usuari a la vista on estigués.
  if (manifest.domain === "catalunya") {
    map.setView(CATALUNYA_CENTER, CATALUNYA_ZOOM);
  }
}

function renderLegend(colorBins, labels) {
  legendEl.innerHTML = "";
  if (!colorBins) return;
  colorBins.forEach((bin, i) => {
    const row = document.createElement("div");
    row.className = "legend-row";
    const sw = document.createElement("div");
    sw.className = "legend-swatch";
    sw.style.background = bin.color;
    const lbl = document.createElement("span");
    lbl.textContent = (labels && labels[i]) ? labels[i] : `≤ ${bin.max}`;
    row.appendChild(sw);
    row.appendChild(lbl);
    legendEl.appendChild(row);
  });
}

// ─────────────────────────────────────────────────────────────────────────
// CACHE DE FRAMES (v4: cada timestep és un fitxer separat, baixat sota
// demanda — no cal tornar-lo a baixar si ja s'ha vist)
// ─────────────────────────────────────────────────────────────────────────
let frameCache = {};

async function getFrameValues(i) {
  if (frameCache[i]) return frameCache[i];
  const frame = manifest.frames[i];
  if (!frame) return null;
  const res = await fetch(`${manifest._base}/${frame.file}`);
  const values = await res.json();
  frameCache[i] = values;
  return values;
}

function prefetchFrame(i) {
  if (!manifest || !manifest.frames[i] || frameCache[i]) return;
  getFrameValues(i).catch(() => {});  // silenciós, és només una millora de fluïdesa
}

// ─────────────────────────────────────────────────────────────────────────
// RENDER DE FRAME
// ─────────────────────────────────────────────────────────────────────────
async function renderFrame(i) {
  if (!manifest) return;
  const frame = manifest.frames[i];
  if (!frame) return;
  const values = await getFrameValues(i);
  if (!values) return;
  gridLayer.setFrame(values);
  labelEl.textContent = new Date(frame.time).toLocaleString("ca-ES", {
    day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit"
  }) + "Z";

  // pre-carrega el següent i l'anterior en segon pla, perquè moure el
  // slider vagi fluid un cop l'usuari ja n'ha vist algun al voltant
  prefetchFrame(i + 1);
  prefetchFrame(i - 1);
}

sliderEl.addEventListener("input", () => renderFrame(parseInt(sliderEl.value, 10)));

// ─────────────────────────────────────────────────────────────────────────
// PLAY / PAUSE
// ─────────────────────────────────────────────────────────────────────────
playBtn.onclick = () => (playing ? stopPlaying() : startPlaying());

function startPlaying() {
  if (!manifest) return;
  playing = true;
  playBtn.textContent = "⏸";
  playTimer = setInterval(() => {
    let next = (parseInt(sliderEl.value, 10) + 1) % manifest.frames.length;
    sliderEl.value = next;
    renderFrame(next);
  }, 600);
}

function stopPlaying() {
  playing = false;
  playBtn.textContent = "▶";
  clearInterval(playTimer);
}

// ─────────────────────────────────────────────────────────────────────────
// SELECTOR DE DIES
// ─────────────────────────────────────────────────────────────────────────
function updateDaysControl() {
  if (!manifest || manifest.frames.length < 2) return;
  const t0 = new Date(manifest.frames[0].time).getTime();
  const t1 = new Date(manifest.frames[manifest.frames.length - 1].time).getTime();
  const realSpanDays = (t1 - t0) / 86400000;
  const maxDays = Math.max(1, Math.ceil(realSpanDays));
  manifest._maxDays = maxDays;
  daysSlider.min = 1;
  daysSlider.max = maxDays;
  daysSlider.step = 1;
  daysSlider.value = maxDays;
  daysLabel.textContent = `${maxDays} ${maxDays === 1 ? "dia" : "dies"}`;
}

daysSlider.addEventListener("input", () => {
  const v = parseInt(daysSlider.value, 10);
  daysLabel.textContent = `${v} ${v === 1 ? "dia" : "dies"}`;
});

function frameIndicesInRange(days) {
  // Al màxim del slider, inclou TOTS els frames directament — evita que
  // l'arrodoniment de "maxDays" (mostrat com p.ex. "4.9 dies") deixi fora
  // les últimes hores per una comparació de temps que just just no hi arriba.
  if (manifest._maxDays !== undefined && days >= manifest._maxDays - 1e-9) {
    return manifest.frames.map((_, i) => i);
  }
  const t0 = new Date(manifest.frames[0].time).getTime();
  const maxMs = days * 86400000;
  const idxs = [];
  manifest.frames.forEach((f, i) => {
    if ((new Date(f.time).getTime() - t0) <= maxMs) idxs.push(i);
  });
  return idxs;
}

// ─────────────────────────────────────────────────────────────────────────
// COBERTURA: intersecció simple lat/lng (ja no cal Web Mercator, treballem
// directament amb la graella en EPSG:4326)
// ─────────────────────────────────────────────────────────────────────────
function getDomainBoundsLatLng() {
  const lon = manifest.lon, lat = manifest.lat;
  return {
    latMin: Math.min(...lat), latMax: Math.max(...lat),
    lonMin: Math.min(...lon), lonMax: Math.max(...lon),
  };
}

function getCropBounds() {
  const dom = getDomainBoundsLatLng();
  const vb = map.getBounds();
  const latMin = Math.max(dom.latMin, vb.getSouth());
  const latMax = Math.min(dom.latMax, vb.getNorth());
  const lonMin = Math.max(dom.lonMin, vb.getWest());
  const lonMax = Math.min(dom.lonMax, vb.getEast());
  if (latMin >= latMax || lonMin >= lonMax) return null;
  return { latMin, latMax, lonMin, lonMax };
}

function updateCoverageWarning() {
  if (!manifest) return;
  const crop = getCropBounds();
  coverageWarnEl.style.display = crop ? "none" : "block";
  btnViewMosaic.disabled = !crop;
  btnViewGif.disabled = !crop;
}

map.on("moveend zoomend", updateCoverageWarning);

// ─────────────────────────────────────────────────────────────────────────
// DIBUIX DIRECTE DE LA GRAELLA A UN CANVAS DE MIDA ARBITRÀRIA
// (projecció equirectangular senzilla — mateixa filosofia que els mapes
// PlateCarree que ja fas servir a plot_time_mosaic_gridspec)
// ─────────────────────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────
// BASEMAP REAL (rajoles de CartoDB) per a les descàrregues — Web Mercator
// de veritat, no la projecció equirectangular simplificada que fem servir
// per posicionar les cel·les de la graella al mateix canvas.
// ─────────────────────────────────────────────────────────────────────────
// "Voyager" en comptes de "light_all" nomès per les descàrregues — més
// contrast i etiquetes de ciutat/regió molt més llegibles sota la capa
// de dades. El mapa en directe es queda amb light_all (Positron).
const TILE_URL = (z, x, y) => `https://a.basemaps.cartocdn.com/rastertiles/voyager/${z}/${x}/${y}.png`;

function lonToTileX(lon, z) { return (lon + 180) / 360 * Math.pow(2, z); }
function latToTileY(lat, z) {
  const rad = lat * Math.PI / 180;
  return (1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2 * Math.pow(2, z);
}
function tileXToLon(x, z) { return x / Math.pow(2, z) * 360 - 180; }
function tileYToLat(y, z) {
  const n = Math.PI - 2 * Math.PI * y / Math.pow(2, z);
  return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}
function mercX(lon) { return 6378137 * lon * Math.PI / 180; }
function mercY(lat) { return 6378137 * Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360)); }
function mercXToLon(x) { return x / 6378137 * 180 / Math.PI; }
function mercYToLat(y) { return (2 * Math.atan(Math.exp(y / 6378137)) - Math.PI / 2) * 180 / Math.PI; }

/**
 * Ajusta el crop perquè la seva relació d'aspecte (en Mercator) coincideixi
 * exactament amb destW/destH, afegint marge simètric a l'eix que calgui
 * (mai deformant). Sense això, les rajoles del basemap (i la graella)
 * s'estiraven de manera no uniforme per encaixar en un requadre amb una
 * proporció diferent — d'aquí la "deformació" del text dels mapes.
 */
function adjustCropAspect(crop, destW, destH) {
  const xMinM = mercX(crop.lonMin), xMaxM = mercX(crop.lonMax);
  const yMinM = mercY(crop.latMin), yMaxM = mercY(crop.latMax);
  const xSpan = xMaxM - xMinM, ySpan = yMaxM - yMinM;
  const targetRatio = destW / destH;
  const currentRatio = xSpan / ySpan;

  let nXMin = xMinM, nXMax = xMaxM, nYMin = yMinM, nYMax = yMaxM;

  if (currentRatio > targetRatio) {
    const newYSpan = xSpan / targetRatio;
    const cy = (yMinM + yMaxM) / 2;
    nYMin = cy - newYSpan / 2;
    nYMax = cy + newYSpan / 2;
  } else {
    const newXSpan = ySpan * targetRatio;
    const cx = (xMinM + xMaxM) / 2;
    nXMin = cx - newXSpan / 2;
    nXMax = cx + newXSpan / 2;
  }

  return {
    lonMin: mercXToLon(nXMin), lonMax: mercXToLon(nXMax),
    latMin: Math.max(-85, mercYToLat(nYMin)), latMax: Math.min(85, mercYToLat(nYMax)),
  };
}

function loadTileImage(z, x, y) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = TILE_URL(z, x, y);
  });
}

/**
 * Retorna una llista de {img, x, y, w, h} (posició/mida ja en píxels del
 * canvas de destí) llestes per dibuixar amb ctx.drawImage. Es calcula un
 * cop per exportació (mateix crop/mida per a tots els frames), no per frame.
 */
async function loadBasemapTiles(crop, destW, destH) {
  const xMinM = mercX(crop.lonMin), xMaxM = mercX(crop.lonMax);
  const yMinM = mercY(crop.latMin), yMaxM = mercY(crop.latMax);

  // tria un zoom tal que la resolució de les rajoles s'aproximi a destW
  const worldSpanM = 2 * Math.PI * 6378137;
  let z = Math.round(Math.log2((destW * worldSpanM) / ((xMaxM - xMinM) * 256)));
  z = Math.max(1, Math.min(15, z));

  const txMin = Math.floor(lonToTileX(crop.lonMin, z));
  const txMax = Math.floor(lonToTileX(crop.lonMax, z));
  const tyMin = Math.floor(latToTileY(crop.latMax, z));
  const tyMax = Math.floor(latToTileY(crop.latMin, z));

  const xForLon = (lo) => (mercX(lo) - xMinM) / (xMaxM - xMinM) * destW;
  const yForLat = (la) => (yMaxM - mercY(la)) / (yMaxM - yMinM) * destH;

  const tileCoords = [];
  for (let ty = tyMin; ty <= tyMax; ty++) {
    for (let tx = txMin; tx <= txMax; tx++) {
      tileCoords.push([tx, ty]);
    }
  }
  // salvaguarda: no petar-ho a base de fer centenars de peticions
  const capped = tileCoords.slice(0, 64);

  const results = await Promise.all(capped.map(async ([tx, ty]) => {
    const wrappedX = ((tx % Math.pow(2, z)) + Math.pow(2, z)) % Math.pow(2, z);
    const img = await loadTileImage(z, wrappedX, ty);
    if (!img) return null;
    const lonW = tileXToLon(tx, z), lonE = tileXToLon(tx + 1, z);
    const latN = tileYToLat(ty, z), latS = tileYToLat(ty + 1, z);
    const x1 = xForLon(lonW), x2 = xForLon(lonE);
    const y1 = yForLat(latN), y2 = yForLat(latS);
    return { img, x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
  }));

  return results.filter(Boolean);
}

function drawGridToCanvas(frameValues, crop, destW, destH, label, basemapTiles) {
  const canvas = document.createElement("canvas");
  canvas.width = destW; canvas.height = destH;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, destW, destH);

  if (basemapTiles && basemapTiles.length) {
    for (const t of basemapTiles) {
      ctx.drawImage(t.img, t.x, t.y, t.w, t.h);
    }
  }

  const lon = manifest.lon, lat = manifest.lat;
  const resLon = lon.length > 1 ? lon[1] - lon[0] : 0.0625;
  const resLat = lat.length > 1 ? lat[1] - lat[0] : 0.0625;

  // Mateixa projecció Web Mercator que fem servir per triar/col·locar les
  // rajoles del basemap (loadBasemapTiles) — així la graella i el fons
  // queden alineats de veritat, no una aproximació equirectangular.
  const xMinM = mercX(crop.lonMin), xMaxM = mercX(crop.lonMax);
  const yMinM = mercY(crop.latMin), yMaxM = mercY(crop.latMax);
  const xForLon = (lo) => (mercX(lo) - xMinM) / (xMaxM - xMinM) * destW;
  const yForLat = (la) => (yMaxM - mercY(la)) / (yMaxM - yMinM) * destH;

  // Vores compartides (mateix motiu que a GridLayer.draw): evita que
  // cel·les veïnes es solapin o deixin escletxa.
  const xPix = new Array(lon.length + 1);
  for (let j = 0; j <= lon.length; j++) {
    const edgeLon = j < lon.length ? lon[j] - resLon / 2 : lon[lon.length - 1] + resLon / 2;
    xPix[j] = Math.round(xForLon(edgeLon));
  }
  const yPix = new Array(lat.length + 1);
  for (let i = 0; i <= lat.length; i++) {
    const edgeLat = i < lat.length ? lat[i] - resLat / 2 : lat[lat.length - 1] + resLat / 2;
    yPix[i] = Math.round(yForLat(edgeLat));
  }

  ctx.globalAlpha = basemapTiles && basemapTiles.length ? 0.72 : 1;
  for (let i = 0; i < lat.length; i++) {
    const cLat = lat[i];
    if (cLat < crop.latMin - Math.abs(resLat) || cLat > crop.latMax + Math.abs(resLat)) continue;
    const row = frameValues[i];
    const y1 = yPix[i], y2 = yPix[i + 1];
    const y = Math.min(y1, y2), h = Math.abs(y2 - y1);
    for (let j = 0; j < lon.length; j++) {
      const v = row[j];
      if (v === null) continue;
      const cLon = lon[j];
      if (cLon < crop.lonMin - Math.abs(resLon) || cLon > crop.lonMax + Math.abs(resLon)) continue;

      const color = colorForValue(v, manifest.color_bins, TRANSPARENT_ZERO[currentVar]);
      if (!color) continue;

      const x1 = xPix[j], x2 = xPix[j + 1];
      ctx.fillStyle = color;
      ctx.fillRect(Math.min(x1, x2), y, Math.abs(x2 - x1), h);
    }
  }

  ctx.globalAlpha = 1;

  // Contorns de costa/fronteres vectorials nomès com a fallback — si ja
  // tenim un basemap real (amb costes/fronteres pròpies a la imatge), no
  // cal duplicar-ho amb el contorn dibuixat a mà.
  if ((!basemapTiles || !basemapTiles.length) && countryGeoJSON) {
    drawBordersToCanvas(ctx, countryGeoJSON, xForLon, yForLat, crop);
  }

  if (label) {
    ctx.font = "bold 15px sans-serif";
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = "rgba(0,0,0,0.72)";
    ctx.fillRect(6, destH - 26, tw + 12, 20);
    ctx.fillStyle = "#fff";
    ctx.fillText(label, 12, destH - 11);
  }

  return canvas;
}

function timeLabelFor(frame) {
  return new Date(frame.time).toLocaleString("ca-ES", {
    day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit"
  }) + "Z";
}

// ─────────────────────────────────────────────────────────────────────────
// LOGO (cantonada inferior dreta, com al mosaic oficial)
// ─────────────────────────────────────────────────────────────────────────
let logoImg = null;
let logoLoadPromise = null;

function loadLogo() {
  if (logoImg) return Promise.resolve(logoImg);
  if (logoLoadPromise) return logoLoadPromise;
  logoLoadPromise = new Promise((resolve) => {
    const img = new Image();
    img.onload = () => { logoImg = img; resolve(img); };
    img.onerror = () => resolve(null);
    img.src = "./vendor/logo_bombers.png";
  });
  return logoLoadPromise;
}

function drawLogo(ctx, canvasW, canvasH, targetH = 34) {
  if (!logoImg) return;
  const ratio = logoImg.width / logoImg.height;
  const h = targetH;
  const w = h * ratio;
  const margin = 10;
  ctx.drawImage(logoImg, canvasW - w - margin, canvasH - h - margin, w, h);
}
function drawLegend(ctx, centerX, y, width, colorBins, labels) {
  const n = colorBins.length;
  const segW = width / n;
  const barH = 20;
  const x0 = centerX - width / 2;

  for (let i = 0; i < n; i++) {
    ctx.fillStyle = colorBins[i].color;
    ctx.fillRect(x0 + i * segW, y, segW, barH);
    ctx.strokeStyle = "#999";
    ctx.lineWidth = 1;
    ctx.strokeRect(x0 + i * segW, y, segW, barH);
  }

  ctx.fillStyle = "#111";
  ctx.font = "12px sans-serif";
  ctx.textAlign = "center";
  for (let i = 0; i < n; i++) {
    const label = (labels && labels[i]) ? labels[i] : String(colorBins[i].max);
    ctx.fillText(label, x0 + i * segW + segW / 2, y + barH + 16);
  }
  ctx.textAlign = "left";
}

// ─────────────────────────────────────────────────────────────────────────
// CONTORNS (costa/fronteres) — nomès per a les descàrregues "vista actual",
// perquè no quedin com un requadre de colors sense context. El mapa en
// viu ja té el basemap de Leaflet pel mateix propòsit.
// ─────────────────────────────────────────────────────────────────────────
let countryGeoJSON = null;

async function loadCountryBorders() {
  if (countryGeoJSON) return countryGeoJSON;
  try {
    const res = await fetch("./vendor/countries.geojson");
    countryGeoJSON = await res.json();
  } catch (e) {
    countryGeoJSON = { type: "FeatureCollection", features: [] };
  }
  return countryGeoJSON;
}

function drawBordersToCanvas(ctx, geojson, xForLon, yForLat, crop) {
  ctx.save();
  ctx.strokeStyle = "rgba(20,20,20,0.6)";
  ctx.lineWidth = 1;
  const pad = 2; // marge en graus, per no descartar línies que entren just per la vora

  for (const feature of geojson.features) {
    const geom = feature.geometry;
    if (!geom) continue;
    const polys = geom.type === "Polygon" ? [geom.coordinates]
                : geom.type === "MultiPolygon" ? geom.coordinates
                : null;
    if (!polys) continue;

    for (const poly of polys) {
      for (const ring of poly) {
        ctx.beginPath();
        let started = false;
        for (const [lon, lat] of ring) {
          if (lon < crop.lonMin - pad || lon > crop.lonMax + pad ||
              lat < crop.latMin - pad || lat > crop.latMax + pad) {
            started = false;
            continue;
          }
          const x = xForLon(lon), y = yForLat(lat);
          if (!started) { ctx.moveTo(x, y); started = true; }
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function setStatus(msg) { statusMsgEl.textContent = msg; }

// ─────────────────────────────────────────────────────────────────────────
// DESCÀRREGA: MOSAIC PNG DE LA VISTA ACTUAL
// ─────────────────────────────────────────────────────────────────────────
btnViewMosaic.onclick = async () => {
  if (!manifest) return;
  const crop = getCropBounds();
  if (!crop) return;

  await loadCountryBorders();
  await loadLogo();

  const days = parseFloat(daysSlider.value);
  const idxs = frameIndicesInRange(days);
  if (idxs.length === 0) return;

  const cellW = 260, cellH = 200, titleH = 46, legendH = 60;
  const cols = Math.min(8, idxs.length);
  const rows = Math.ceil(idxs.length / cols);

  const cropAdj = adjustCropAspect(crop, cellW - 4, cellH - 4);

  setStatus("Carregant mapa base...");
  const basemapTiles = await loadBasemapTiles(cropAdj, cellW - 4, cellH - 4);

  const outCanvas = document.createElement("canvas");
  outCanvas.width = cols * cellW;
  outCanvas.height = rows * cellH + titleH + legendH;
  const ctx = outCanvas.getContext("2d");
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, outCanvas.width, outCanvas.height);
  ctx.fillStyle = "#111";
  ctx.font = "bold 20px sans-serif";
  ctx.fillText(`${manifest.title} — vista personalitzada`, 10, 30);

  for (let n = 0; n < idxs.length; n++) {
    const idx = idxs[n];
    setStatus(`Generant mosaic (${n + 1}/${idxs.length})...`);
    const values = await getFrameValues(idx);
    const cell = drawGridToCanvas(values, cropAdj, cellW - 4, cellH - 4, timeLabelFor(manifest.frames[idx]), basemapTiles);
    const r = Math.floor(n / cols), c = n % cols;
    ctx.strokeStyle = "#ddd";
    ctx.strokeRect(c * cellW, titleH + r * cellH, cellW, cellH);
    ctx.drawImage(cell, c * cellW + 2, titleH + r * cellH + 2);
  }

  drawLegend(ctx, outCanvas.width / 2, titleH + rows * cellH + 18, Math.min(500, outCanvas.width - 40),
             manifest.color_bins, manifest.legend_labels);
  drawLogo(ctx, outCanvas.width, outCanvas.height, 40);

  outCanvas.toBlob(blob => {
    triggerDownload(blob, `${currentVar}_vista_${Date.now()}.png`);
    setStatus("");
  });
};

// ─────────────────────────────────────────────────────────────────────────
// DESCÀRREGA: GIF DE LA VISTA ACTUAL
// ─────────────────────────────────────────────────────────────────────────
btnViewGif.onclick = async () => {
  if (!manifest) return;
  const crop = getCropBounds();
  if (!crop) return;

  await loadCountryBorders();
  await loadLogo();

  const days = parseFloat(daysSlider.value);
  const idxs = frameIndicesInRange(days);
  if (idxs.length === 0) return;

  setStatus(`Generant GIF (0/${idxs.length})...`);

  const gifW = 480, gifH = 360, legendStripH = 54;
  const cropAdj = adjustCropAspect(crop, gifW, gifH);

  setStatus("Carregant mapa base...");
  const basemapTiles = await loadBasemapTiles(cropAdj, gifW, gifH);

  const gif = new GIF({
    workers: 2,
    quality: 10,
    width: gifW,
    height: gifH + legendStripH,
    workerScript: "./vendor/gif.worker.js",
  });

  for (let n = 0; n < idxs.length; n++) {
    const idx = idxs[n];
    const values = await getFrameValues(idx);
    const mapCanvas = drawGridToCanvas(values, cropAdj, gifW, gifH, timeLabelFor(manifest.frames[idx]), basemapTiles);

    const frameCanvas = document.createElement("canvas");
    frameCanvas.width = gifW;
    frameCanvas.height = gifH + legendStripH;
    const fctx = frameCanvas.getContext("2d");
    fctx.fillStyle = "#fff";
    fctx.fillRect(0, 0, gifW, gifH + legendStripH);
    fctx.drawImage(mapCanvas, 0, 0);

    // Llegenda a l'esquerra, espai reservat pel logo a la dreta — evita
    // que es xafin en una franja tan estreta.
    const legendW = 370;
    drawLegend(fctx, 10 + legendW / 2, gifH + 8, legendW,
               manifest.color_bins, manifest.legend_labels);
    drawLogo(fctx, gifW, gifH + legendStripH, 24);

    gif.addFrame(frameCanvas, { delay: 500 });
    setStatus(`Generant GIF (${n + 1}/${idxs.length})...`);
  }

  gif.on("finished", blob => {
    triggerDownload(blob, `${currentVar}_vista_${Date.now()}.gif`);
    setStatus("");
  });
  gif.render();
};

// ─────────────────────────────────────────────────────────────────────────
// INICI
// ─────────────────────────────────────────────────────────────────────────
loadVariable(VARIABLES[0].id);
</script>
