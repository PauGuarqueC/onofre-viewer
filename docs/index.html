<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>ONOFRE — Visor de pronòstic</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --bg: #0f1418;
    --panel: #171e24;
    --border: #2a343c;
    --text: #e8edf1;
    --muted: #8fa1ac;
    --accent: #ff6b35;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text);
               font-family: "Segoe UI", Roboto, sans-serif; }
  #map { position: absolute; inset: 0; }
  .grid-canvas-layer { pointer-events: none; }

  #topbar {
    position: absolute; top: 12px; left: 12px; right: 12px; z-index: 1000;
    display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap;
    pointer-events: none;
  }
  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; pointer-events: auto; box-shadow: 0 4px 14px rgba(0,0,0,.35);
  }
  #varSelect { display: flex; gap: 6px; }
  .var-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    padding: 7px 12px; border-radius: 7px; cursor: pointer; font-size: 13px;
  }
  .var-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  #domainNote { font-size: 12px; color: var(--muted); margin-top: 6px; max-width: 260px; }

  #legend { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
  .legend-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(255,255,255,.15); }

  #bottombar {
    position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 1000;
    display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
    pointer-events: none;
  }
  #timePanel { flex: 1; min-width: 260px; pointer-events: auto; }
  #timeRow { display: flex; align-items: center; gap: 10px; }
  #playBtn {
    background: var(--accent); border: none; color: #fff; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; font-size: 14px; flex-shrink: 0;
  }
  #timeSlider { flex: 1; }
  #timeLabel { font-size: 13px; color: var(--muted); min-width: 130px; text-align: right; }

  #downloadPanel { pointer-events: auto; display: flex; gap: 8px; }
  .dl-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
    text-decoration: none; display: inline-block; font-family: inherit;
  }
  .dl-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .dl-btn:disabled { opacity: .35; cursor: not-allowed; }

  #viewportPanel { pointer-events: auto; min-width: 240px; }
  #viewportPanel h4 { margin: 0 0 8px 0; font-size: 12px; color: var(--muted);
                       text-transform: uppercase; letter-spacing: .04em; }
  #daysRow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  #daysRow input[type=range] { flex: 1; }
  #daysLabel { font-size: 12px; color: var(--muted); min-width: 55px; text-align: right; }
  #viewportBtns { display: flex; gap: 8px; }
  #statusMsg { font-size: 11px; color: var(--accent); margin-top: 6px; min-height: 14px; }
  #coverageWarn { font-size: 11px; color: #ff9f6b; margin-top: 4px; display: none; }
</style>
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div class="panel">
    <div id="varSelect"></div>
    <div id="domainNote"></div>
    <div id="legend"></div>
  </div>
</div>

<div id="bottombar">
  <div class="panel" id="timePanel">
    <div id="timeRow">
      <button id="playBtn">▶</button>
      <input type="range" id="timeSlider" min="0" max="0" value="0" step="1">
      <span id="timeLabel">—</span>
    </div>
  </div>

  <div class="panel" id="viewportPanel">
    <h4>Descarrega la vista actual</h4>
    <div id="daysRow">
      <input type="range" id="daysSlider" min="1" max="1" value="1" step="1">
      <span id="daysLabel">— dies</span>
    </div>
    <div id="viewportBtns">
      <button class="dl-btn" id="btnViewMosaic">📷 Mosaic PNG</button>
      <button class="dl-btn" id="btnViewGif">🎞 GIF</button>
    </div>
    <div id="statusMsg"></div>
    <div id="coverageWarn">⚠ La vista actual no coincideix amb la cobertura d'aquesta variable.</div>
  </div>

  <div class="panel" id="downloadPanel">
    <a class="dl-btn" id="dlMosaic" href="#" download>⬇ Mapa oficial (PNG)</a>
    <a class="dl-btn" id="dlGif" href="#" download>⬇ Animació oficial (GIF)</a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./vendor/gif.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────
// CONFIGURACIÓ
// ─────────────────────────────────────────────────────────────────────────
const DATA_ROOT = "./data";
const RUN_TAG = "latest";

const VARIABLES = [
  { id: "complexitat",   label: "Complexitat (Finestra IF)" },
  { id: "piroconveccio", label: "Tipus de piroconvecció" },
  { id: "ros_fli",       label: "ROS / FLI" },
];

// Preferència purament visual (no és "dada"): quines variables amaguen
// el valor 0 en comptes de pintar-lo. Editar aquí, no cal tocar el
// backend ni regenerar res — és només com es dibuixa, no què es calcula.
const TRANSPARENT_ZERO = {
  complexitat: true,
  piroconveccio: false,
  ros_fli: true,
};

const CATALUNYA_CENTER = [41.5, 1.3];
const CATALUNYA_ZOOM = 8;

// ─────────────────────────────────────────────────────────────────────────
// MAPA BASE
// ─────────────────────────────────────────────────────────────────────────
const map = L.map("map", { zoomControl: true }).setView(CATALUNYA_CENTER, CATALUNYA_ZOOM);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: "&copy; OpenStreetMap &copy; CARTO",
  maxZoom: 14,
}).addTo(map);

// ─────────────────────────────────────────────────────────────────────────
// CAPA DE GRAELLA (dibuixa cada cel·la amb <canvas>, sempre nítida)
// ─────────────────────────────────────────────────────────────────────────
function colorForValue(v, colorBins, transparentZero) {
  if (v === null || v === undefined) return null;
  if (transparentZero && v === 0) return null;
  for (const bin of colorBins) {
    if (v < bin.max) return bin.color;
  }
  return colorBins[colorBins.length - 1].color;
}

const GridLayer = L.Layer.extend({
  onAdd(map) {
    this._map = map;
    this._canvas = L.DomUtil.create("canvas", "grid-canvas-layer");
    map.getPanes().overlayPane.appendChild(this._canvas);
    map.on("moveend zoomend resize", this._reset, this);
    this._reset();
  },
  onRemove(map) {
    L.DomUtil.remove(this._canvas);
    map.off("moveend zoomend resize", this._reset, this);
  },
  _reset() {
    const size = this._map.getSize();
    const topLeft = this._map.containerPointToLayerPoint([0, 0]);
    L.DomUtil.setPosition(this._canvas, topLeft);
    this._canvas.width = size.x;
    this._canvas.height = size.y;
    this.draw();
  },
  setData(lon, lat, colorBins, transparentZero) {
    this._lon = lon; this._lat = lat; this._colorBins = colorBins;
    this._transparentZero = !!transparentZero;
  },
  setFrame(values) {
    this._values = values;
    this.draw();
  },
  draw() {
    if (!this._map || !this._values || !this._lon) return;
    const ctx = this._canvas.getContext("2d");
    ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);

    const lon = this._lon, lat = this._lat, values = this._values;
    const resLon = lon.length > 1 ? lon[1] - lon[0] : 0.0625;
    const resLat = lat.length > 1 ? lat[1] - lat[0] : 0.0625;
    const bounds = this._map.getBounds().pad(0.15);

    // Vores de la graella (nlon+1 / nlat+1 valors), calculades UN COP i
    // compartides entre cel·les veïnes — així dues cel·les contigües
    // encaixen exactament pel mateix píxel, sense ni escletxa ni
    // solapament (que amb alpha<1 es veia com una línia de color barrejat).
    // En Web Mercator (la projecció de Leaflet), x només depèn de lon i
    // y només depèn de lat, així que això és exacte, no una aproximació.
    const refLat = lat[0], refLon = lon[0];
    const xPix = new Array(lon.length + 1);
    for (let j = 0; j <= lon.length; j++) {
      const edgeLon = j < lon.length ? lon[j] - resLon / 2 : lon[lon.length - 1] + resLon / 2;
      xPix[j] = Math.round(this._map.latLngToContainerPoint([refLat, edgeLon]).x);
    }
    const yPix = new Array(lat.length + 1);
    for (let i = 0; i <= lat.length; i++) {
      const edgeLat = i < lat.length ? lat[i] - resLat / 2 : lat[lat.length - 1] + resLat / 2;
      yPix[i] = Math.round(this._map.latLngToContainerPoint([edgeLat, refLon]).y);
    }

    ctx.globalAlpha = 0.85;
    for (let i = 0; i < lat.length; i++) {
      const cLat = lat[i];
      if (cLat < bounds.getSouth() - Math.abs(resLat) || cLat > bounds.getNorth() + Math.abs(resLat)) continue;
      const row = values[i];
      const y1 = yPix[i], y2 = yPix[i + 1];
      const y = Math.min(y1, y2), h = Math.abs(y2 - y1);
      for (let j = 0; j < lon.length; j++) {
        const v = row[j];
        if (v === null) continue;
        const cLon = lon[j];
        if (cLon < bounds.getWest() - Math.abs(resLon) || cLon > bounds.getEast() + Math.abs(resLon)) continue;

        const color = colorForValue(v, this._colorBins, this._transparentZero);
        if (!color) continue;

        const x1 = xPix[j], x2 = xPix[j + 1];
        ctx.fillStyle = color;
        ctx.fillRect(Math.min(x1, x2), y, Math.abs(x2 - x1), h);
      }
    }
  },
});

const gridLayer = new GridLayer();
gridLayer.addTo(map);

let currentVar = null;
let manifest = null;
let playing = false;
let playTimer = null;

const varSelectEl   = document.getElementById("varSelect");
const domainNoteEl  = document.getElementById("domainNote");
const legendEl      = document.getElementById("legend");
const sliderEl       = document.getElementById("timeSlider");
const labelEl        = document.getElementById("timeLabel");
const playBtn        = document.getElementById("playBtn");
const dlMosaic        = document.getElementById("dlMosaic");
const dlGif           = document.getElementById("dlGif");
const daysSlider      = document.getElementById("daysSlider");
const daysLabel       = document.getElementById("daysLabel");
const btnViewMosaic   = document.getElementById("btnViewMosaic");
const btnViewGif      = document.getElementById("btnViewGif");
const statusMsgEl     = document.getElementById("statusMsg");
const coverageWarnEl  = document.getElementById("coverageWarn");

// ─────────────────────────────────────────────────────────────────────────
// SELECTOR DE VARIABLE
// ─────────────────────────────────────────────────────────────────────────
VARIABLES.forEach(v => {
  const btn = document.createElement("button");
  btn.className = "var-btn";
  btn.textContent = v.label;
  btn.dataset.id = v.id;
  btn.onclick = () => loadVariable(v.id);
  varSelectEl.appendChild(btn);
});

function setActiveButton(id) {
  document.querySelectorAll(".var-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.id === id);
  });
}

// ─────────────────────────────────────────────────────────────────────────
// CÀRREGA DE VARIABLE (manifest.json amb lon/lat/color_bins/frames)
// ─────────────────────────────────────────────────────────────────────────
async function loadVariable(id) {
  setActiveButton(id);
  currentVar = id;
  stopPlaying();

  const base = `${DATA_ROOT}/${id}/${RUN_TAG}`;
  const res = await fetch(`${base}/manifest.json`);
  manifest = await res.json();
  manifest._base = base;

  gridLayer.setData(manifest.lon, manifest.lat, manifest.color_bins, TRANSPARENT_ZERO[id]);

  sliderEl.max = manifest.frames.length - 1;
  sliderEl.value = 0;
  renderFrame(0);

  domainNoteEl.textContent = manifest.domain_note || "";
  renderLegend(manifest.color_bins, manifest.legend_labels);
  updateDaysControl();
  updateCoverageWarning();

  dlMosaic.href = `${base}/mosaic.png`;
  dlGif.href = `${base}/animation.gif`;

  map.setView(CATALUNYA_CENTER, CATALUNYA_ZOOM);
}

function renderLegend(colorBins, labels) {
  legendEl.innerHTML = "";
  if (!colorBins) return;
  colorBins.forEach((bin, i) => {
    const row = document.createElement("div");
    row.className = "legend-row";
    const sw = document.createElement("div");
    sw.className = "legend-swatch";
    sw.style.background = bin.color;
    const lbl = document.createElement("span");
    lbl.textContent = (labels && labels[i]) ? labels[i] : `≤ ${bin.max}`;
    row.appendChild(sw);
    row.appendChild(lbl);
    legendEl.appendChild(row);
  });
}

// ─────────────────────────────────────────────────────────────────────────
// RENDER DE FRAME
// ─────────────────────────────────────────────────────────────────────────
function renderFrame(i) {
  if (!manifest) return;
  const frame = manifest.frames[i];
  if (!frame) return;
  gridLayer.setFrame(frame.values);
  labelEl.textContent = new Date(frame.time).toLocaleString("ca-ES", {
    day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit"
  }) + "Z";
}

sliderEl.addEventListener("input", () => renderFrame(parseInt(sliderEl.value, 10)));

// ─────────────────────────────────────────────────────────────────────────
// PLAY / PAUSE
// ─────────────────────────────────────────────────────────────────────────
playBtn.onclick = () => (playing ? stopPlaying() : startPlaying());

function startPlaying() {
  if (!manifest) return;
  playing = true;
  playBtn.textContent = "⏸";
  playTimer = setInterval(() => {
    let next = (parseInt(sliderEl.value, 10) + 1) % manifest.frames.length;
    sliderEl.value = next;
    renderFrame(next);
  }, 600);
}

function stopPlaying() {
  playing = false;
  playBtn.textContent = "▶";
  clearInterval(playTimer);
}

// ─────────────────────────────────────────────────────────────────────────
// SELECTOR DE DIES
// ─────────────────────────────────────────────────────────────────────────
function updateDaysControl() {
  if (!manifest || manifest.frames.length < 2) return;
  const t0 = new Date(manifest.frames[0].time).getTime();
  const t1 = new Date(manifest.frames[manifest.frames.length - 1].time).getTime();
  const maxDays = Math.max(0.5, Math.round((t1 - t0) / 86400000 * 10) / 10);
  daysSlider.min = 0.5;
  daysSlider.max = maxDays;
  daysSlider.step = 0.5;
  daysSlider.value = maxDays;
  daysLabel.textContent = `${maxDays} dies`;
}

daysSlider.addEventListener("input", () => {
  daysLabel.textContent = `${daysSlider.value} dies`;
});

function framesInRange(days) {
  const t0 = new Date(manifest.frames[0].time).getTime();
  const maxMs = days * 86400000;
  return manifest.frames.filter(f => (new Date(f.time).getTime() - t0) <= maxMs);
}

// ─────────────────────────────────────────────────────────────────────────
// COBERTURA: intersecció simple lat/lng (ja no cal Web Mercator, treballem
// directament amb la graella en EPSG:4326)
// ─────────────────────────────────────────────────────────────────────────
function getDomainBoundsLatLng() {
  const lon = manifest.lon, lat = manifest.lat;
  return {
    latMin: Math.min(...lat), latMax: Math.max(...lat),
    lonMin: Math.min(...lon), lonMax: Math.max(...lon),
  };
}

function getCropBounds() {
  const dom = getDomainBoundsLatLng();
  const vb = map.getBounds();
  const latMin = Math.max(dom.latMin, vb.getSouth());
  const latMax = Math.min(dom.latMax, vb.getNorth());
  const lonMin = Math.max(dom.lonMin, vb.getWest());
  const lonMax = Math.min(dom.lonMax, vb.getEast());
  if (latMin >= latMax || lonMin >= lonMax) return null;
  return { latMin, latMax, lonMin, lonMax };
}

function updateCoverageWarning() {
  if (!manifest) return;
  const crop = getCropBounds();
  coverageWarnEl.style.display = crop ? "none" : "block";
  btnViewMosaic.disabled = !crop;
  btnViewGif.disabled = !crop;
}

map.on("moveend zoomend", updateCoverageWarning);

// ─────────────────────────────────────────────────────────────────────────
// DIBUIX DIRECTE DE LA GRAELLA A UN CANVAS DE MIDA ARBITRÀRIA
// (projecció equirectangular senzilla — mateixa filosofia que els mapes
// PlateCarree que ja fas servir a plot_time_mosaic_gridspec)
// ─────────────────────────────────────────────────────────────────────────
function drawGridToCanvas(frameValues, crop, destW, destH, label) {
  const canvas = document.createElement("canvas");
  canvas.width = destW; canvas.height = destH;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, destW, destH);

  const lon = manifest.lon, lat = manifest.lat;
  const resLon = lon.length > 1 ? lon[1] - lon[0] : 0.0625;
  const resLat = lat.length > 1 ? lat[1] - lat[0] : 0.0625;

  const xForLon = (lo) => (lo - crop.lonMin) / (crop.lonMax - crop.lonMin) * destW;
  const yForLat = (la) => (crop.latMax - la) / (crop.latMax - crop.latMin) * destH;

  // Vores compartides (mateix motiu que a GridLayer.draw): evita que
  // cel·les veïnes es solapin o deixin escletxa.
  const xPix = new Array(lon.length + 1);
  for (let j = 0; j <= lon.length; j++) {
    const edgeLon = j < lon.length ? lon[j] - resLon / 2 : lon[lon.length - 1] + resLon / 2;
    xPix[j] = Math.round(xForLon(edgeLon));
  }
  const yPix = new Array(lat.length + 1);
  for (let i = 0; i <= lat.length; i++) {
    const edgeLat = i < lat.length ? lat[i] - resLat / 2 : lat[lat.length - 1] + resLat / 2;
    yPix[i] = Math.round(yForLat(edgeLat));
  }

  for (let i = 0; i < lat.length; i++) {
    const cLat = lat[i];
    if (cLat < crop.latMin - Math.abs(resLat) || cLat > crop.latMax + Math.abs(resLat)) continue;
    const row = frameValues[i];
    const y1 = yPix[i], y2 = yPix[i + 1];
    const y = Math.min(y1, y2), h = Math.abs(y2 - y1);
    for (let j = 0; j < lon.length; j++) {
      const v = row[j];
      if (v === null) continue;
      const cLon = lon[j];
      if (cLon < crop.lonMin - Math.abs(resLon) || cLon > crop.lonMax + Math.abs(resLon)) continue;

      const color = colorForValue(v, manifest.color_bins, TRANSPARENT_ZERO[currentVar]);
      if (!color) continue;

      const x1 = xPix[j], x2 = xPix[j + 1];
      ctx.fillStyle = color;
      ctx.fillRect(Math.min(x1, x2), y, Math.abs(x2 - x1), h);
    }
  }

  if (label) {
    ctx.font = "bold 15px sans-serif";
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = "rgba(0,0,0,0.72)";
    ctx.fillRect(6, destH - 26, tw + 12, 20);
    ctx.fillStyle = "#fff";
    ctx.fillText(label, 12, destH - 11);
  }

  return canvas;
}

function timeLabelFor(frame) {
  return new Date(frame.time).toLocaleString("ca-ES", {
    day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit"
  }) + "Z";
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function setStatus(msg) { statusMsgEl.textContent = msg; }

// ─────────────────────────────────────────────────────────────────────────
// DESCÀRREGA: MOSAIC PNG DE LA VISTA ACTUAL
// ─────────────────────────────────────────────────────────────────────────
btnViewMosaic.onclick = () => {
  if (!manifest) return;
  const crop = getCropBounds();
  if (!crop) return;

  const days = parseFloat(daysSlider.value);
  const frames = framesInRange(days);
  if (frames.length === 0) return;

  const cellW = 260, cellH = 200, titleH = 46;
  const cols = Math.min(8, frames.length);
  const rows = Math.ceil(frames.length / cols);

  const outCanvas = document.createElement("canvas");
  outCanvas.width = cols * cellW;
  outCanvas.height = rows * cellH + titleH;
  const ctx = outCanvas.getContext("2d");
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, 0, outCanvas.width, outCanvas.height);
  ctx.fillStyle = "#111";
  ctx.font = "bold 20px sans-serif";
  ctx.fillText(`${manifest.title} — vista personalitzada`, 10, 30);

  frames.forEach((frame, i) => {
    const cell = drawGridToCanvas(frame.values, crop, cellW - 4, cellH - 4, timeLabelFor(frame));
    const r = Math.floor(i / cols), c = i % cols;
    ctx.strokeStyle = "#ddd";
    ctx.strokeRect(c * cellW, titleH + r * cellH, cellW, cellH);
    ctx.drawImage(cell, c * cellW + 2, titleH + r * cellH + 2);
  });

  outCanvas.toBlob(blob => triggerDownload(blob, `${currentVar}_vista_${Date.now()}.png`));
};

// ─────────────────────────────────────────────────────────────────────────
// DESCÀRREGA: GIF DE LA VISTA ACTUAL
// ─────────────────────────────────────────────────────────────────────────
btnViewGif.onclick = () => {
  if (!manifest) return;
  const crop = getCropBounds();
  if (!crop) return;

  const days = parseFloat(daysSlider.value);
  const frames = framesInRange(days);
  if (frames.length === 0) return;

  setStatus(`Generant GIF (0/${frames.length})...`);

  const gif = new GIF({
    workers: 2,
    quality: 10,
    width: 480,
    height: 360,
    workerScript: "./vendor/gif.worker.js",
  });

  frames.forEach((frame, i) => {
    const canvas = drawGridToCanvas(frame.values, crop, 480, 360, timeLabelFor(frame));
    gif.addFrame(canvas, { delay: 500 });
    setStatus(`Generant GIF (${i + 1}/${frames.length})...`);
  });

  gif.on("finished", blob => {
    triggerDownload(blob, `${currentVar}_vista_${Date.now()}.gif`);
    setStatus("");
  });
  gif.render();
};

// ─────────────────────────────────────────────────────────────────────────
// INICI
// ─────────────────────────────────────────────────────────────────────────
loadVariable(VARIABLES[0].id);
</script>
</body>
</html>
